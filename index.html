      </div>
    </div>
    <script>
      // Remove HTML splash once React mounts
      var _ro = new MutationObserver(function() {
        var s = document.getElementById('html-splash');
        if (s && document.querySelector('[data-reactroot], #root > :not(#html-splash)')) { s.remove(); _ro.disconnect(); }
      });
      _ro.observe(document.getElementById('root'), { childList: true });
    </script>
